🏗️ Architecture Patterns
1. Single Responsibility Principle
Each module has ONE clear purpose:
	∙	chart_manager → Chart state ONLY
	∙	broadcast_manager → Streaming ONLY
	∙	trade_handler → Trades ONLY
	∙	message_handler → Routing ONLY
2. Dependency Injection
Dependencies are injected via callbacks:

# In websocket_server.setup()
broadcast_manager.set_broadcast_callback(self.broadcast_to_all)
strategy_manager.trade_executor = self.execute_strategy_trade


3. Global Singletons
Each module exports a global instance:

# chart_manager.py
chart_manager = ChartManager()

# Import elsewhere
from chart_manager import chart_manager


4. Async/Await Everywhere
All I/O operations are async:

async def send_initial_data(websocket, symbol, timeframe):
    success, error, candles = await chart_manager.fetch_initial_candles(...)


5. State Machines
Chart state is atomic and validated:

pending_change → initial_sent → valid


6. Observer Pattern
Broadcast loops continuously check state and push updates
7. Command Pattern
Messages are commands routed to handlers:

"SUBSCRIBE_EURUSD_H1" → broadcast_manager.send_initial_data()


🛠️ Common Tasks
Adding a New Message Type
	1.	Add to message_handler.py:

elif message.startswith("MY_COMMAND_"):
    await self._handle_my_command(message, websocket)


	2.	Implement handler (in appropriate module):

async def handle_my_command(self, message, websocket):
    # Process command
    result = do_something()
    
    # Send response
    await websocket.send(json.dumps({
        'type': 'my_response',
        'data': result
    }))


Adding a New Broadcast Loop
	1.	Add to broadcast_manager.py:

async def broadcast_my_data(self):
    while self.running:
        if self.broadcast_callback:
            try:
                data = fetch_my_data()
                await self.broadcast_to_all({
                    'type': 'my_data',
                    'data': data
                })
            except Exception as e:
                print(f"Error: {e}")
        
        await asyncio.sleep(interval)


	2.	Start in websocket_server.py:

my_task = asyncio.create_task(broadcast_manager.broadcast_my_data())
self.tasks.append(my_task)


Adding a New Strategy
	1.	Create strategy file (e.g., strategy_rsi.py):

class RSIStrategy:

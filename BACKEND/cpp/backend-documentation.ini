## 📖 Module Descriptions

### 1️⃣ `main_launcher.py` - Entry Point
**Purpose**: Application bootstrap and lifecycle management

**Responsibilities**:
- Connect to MT5 via `connector`
- Create and configure `WebSocketServer`
- Handle shutdown signals (SIGINT, SIGTERM)
- Cleanup on exit

**Key Functions**:
```python
async def main():
    # Connect MT5
    connector.connect()
    
    # Create server
    server = create_server()
    
    # Start server
    await server.start()
    
    # Cleanup
    connector.disconnect()


Usage:

python main_launcher.py


2️⃣ websocket_server.py - Orchestrator
Purpose: Central hub that wires all modules together
Responsibilities:
	∙	Manage WebSocket client connections (connected_clients)
	∙	Provide broadcast_to_all() callback to other modules
	∙	Wire callbacks between modules (strategy_manager ↔ connector)
	∙	Start/stop background broadcast loops
	∙	Handle reconnection events
Key Components:

class WebSocketServer:
    def __init__(self, host, port):
        self.connected_clients = set()  # Owns client connections
        
    def setup(self):
        # Wire all modules together
        broadcast_manager.set_broadcast_callback(self.broadcast_to_all)
        strategy_manager.set_send_callback(self.broadcast_to_all)
        strategy_manager.trade_executor = self.execute_strategy_trade
        
    async def broadcast_to_all(self, message):
        # Send to all connected clients
        
    async def handle_client(self, websocket):
        # Handle individual client connection


Module Wiring:
	∙	broadcast_manager ← gets broadcast_to_all() callback
	∙	strategy_manager ← gets broadcast_to_all(), trade_executor, data_fetcher
	∙	message_handler ← receives client messages

3️⃣ message_handler.py - Message Router
Purpose: Route incoming WebSocket messages to appropriate handlers
Responsibilities:
	∙	Parse client messages
	∙	Route to correct module based on message prefix
	∙	Handle errors gracefully
Message Routing Table:

Message Pattern              → Handler
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SUBSCRIBE_EURUSD_H1         → broadcast_manager.send_initial_data()
UNSUBSCRIBE_EURUSD          → chart_manager.clear_chart_state()
GET_CANDLES_EURUSD_M5       → broadcast_manager.send_initial_data()
INITIAL_DATA_RECEIVED       → chart_manager.mark_chart_ready()

DEPLOY_STRATEGY_*           → strategy_manager.handle_raw_command()
REMOVE_STRATEGY_*           → strategy_manager.handle_raw_command()
BACKTEST_STRATEGY_*         → strategy_manager.handle_raw_command()
GET_ACTIVE_STRATEGIES       → strategy_manager.handle_raw_command()

TRADE_BUY_EURUSD_0.01_1.08  → trade_handler.handle_trade_command()
CLOSE_POSITION_12345        → trade_handler.handle_close_position()
CLOSE_ALL                   → trade_handler.handle_close_all()

GET_POSITIONS               → broadcast_manager.send_positions_update()
GET_ACCOUNT_INFO            → broadcast_manager.send_account_info()
GET_CURRENT_PRICE           → broadcast_manager.send_current_price()

AUTO_ON                     → trade_handler + strategy_manager
AUTO_OFF                    → trade_handler + strategy_manager

CLEAR_CACHE                 → connector + chart_manager



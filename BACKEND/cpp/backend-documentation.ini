🐛 Troubleshooting
Problem: “No data available for EURUSD”
Causes:
	1.	MT5 not connected
	2.	Symbol not found
	3.	No historical data in MT5
Solutions:

# 1. Check MT5 connection
connector.check_mt5_connection()

# 2. Check symbol detection
detected = connector.auto_detect_symbol("EURUSD")
print(f"Detected: {detected}")  # Should be "EURUSD" or "EURUSD.a"

# 3. Check MT5 has data
# Open MT5 → Market Watch → Right-click symbol → Chart


Problem: Chart not updating
Causes:
	1.	Frontend didn’t send INITIAL_DATA_RECEIVED
	2.	Chart state invalid
	3.	Broadcast loop not running
Solutions:

# 1. Check chart state
state = chart_manager.get_chart_state()
print(f"Chart state: {state}")
print(f"Is valid: {chart_manager.is_chart_valid()}")

# 2. Check broadcast loop
print(f"Broadcast running: {broadcast_manager.running}")

# 3. Frontend must send confirmation
ws.send("INITIAL_DATA_RECEIVED")


Problem: Strategies not executing trades
Causes:
	1.	Auto-trading disabled
	2.	Strategy not active
	3.	No signals generated
Solutions:

# 1. Enable auto-trading
ws.send("AUTO_ON")

# 2. Check strategy status
ws.send("GET_ACTIVE_STRATEGIES")
# Look for "active": true

# 3. Check strategy signals
# Signals appear in frontend as 'strategy_signal' messages


Problem: MT5 disconnects frequently
Causes:
	1.	MT5 terminal closed
	2.	Network issues
	3.	MT5 timeout
Solutions:

# 1. Keep MT5 terminal open

# 2. Increase timeout in config.py
MT5_TIMEOUT = 120000  # 2 minutes

# 3. Monitor reconnection
# Server automatically reconnects and restores chart


Problem: WebSocket connection drops
Causes:
	1.	Network timeout
	2.	No ping/pong
	3.	Client-side error
Solutions:

# 1. Implement ping/pong in client
setInterval(() => ws.send('ping'), 30000);

# 2. Handle reconnection in client
ws.onclose = () => {
    setTimeout(() => {
        ws = new WebSocket('ws://localhost:8765');
    }, 5000);
};


📊 Performance Considerations
Memory Usage
	∙	Candle storage: ~200 candles × 8 fields × 8 bytes = ~12 KB per symbol/timeframe
	∙	Multiple charts: 10 charts × 12 KB = ~120 KB
	∙	Strategy buffers: Similar to candle storage
CPU Usage
	∙	Broadcast loops run independently (4 loops)
	∙	Strategy loops run per-strategy (can be 10+ strategies)
	∙	Each loop is async (non-blocking)
Network Usage
	∙	Chart updates: ~500 bytes per update (every 5s)
	∙	Price updates: ~200 bytes per update (every 0.5s)
	∙	Position updates: ~1 KB per update (every 2s)
Total: ~5-10 KB/s per connected client


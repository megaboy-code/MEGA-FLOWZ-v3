📡 WebSocket Message Protocol
Client → Server Messages
Chart Operations

// Subscribe to chart
ws.send("SUBSCRIBE_EURUSD_H1")

// Unsubscribe from chart
ws.send("UNSUBSCRIBE_EURUSD")

// Get candles (clears cache)
ws.send("GET_CANDLES_EURUSD_M5")

// Confirm initial data received
ws.send("INITIAL_DATA_RECEIVED")


Trade Operations

// Execute trade
ws.send("TRADE_BUY_EURUSD_0.01_1.0850")
ws.send("TRADE_SELL_GBPUSD_0.02_1.2500")

// Close position
ws.send("CLOSE_POSITION_12345")

// Close all positions
ws.send("CLOSE_ALL")


Strategy Operations

// Deploy strategy
ws.send('DEPLOY_STRATEGY_ma_crossover_EURUSD_H1_{"fast":10,"slow":30}')

// Remove strategy
ws.send("REMOVE_STRATEGY_ma_crossover_EURUSD_H1_abc123")

// Update strategy
ws.send('UPDATE_STRATEGY_ma_crossover_EURUSD_H1_abc123_{"fast":8}')

// Backtest strategy
ws.send('BACKTEST_STRATEGY_ma_crossover_EURUSD_H1_30_{"fast":10,"slow":30}')

// Get active strategies
ws.send("GET_ACTIVE_STRATEGIES")


Data Requests

ws.send("GET_POSITIONS")
ws.send("GET_ACCOUNT_INFO")
ws.send("GET_CURRENT_PRICE")
ws.send("GET_CONNECTION_STATUS")


Auto-Trading

ws.send("AUTO_ON")   // Enable auto-trading
ws.send("AUTO_OFF")  // Disable auto-trading


Utility

ws.send("CLEAR_CACHE")  // Clear candle cache
ws.send("ping")         // Ping server



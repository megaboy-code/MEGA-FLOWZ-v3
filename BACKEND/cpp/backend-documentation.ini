## Overview

This is a **modular WebSocket-based trading dashboard** that connects to MetaTrader 5 (MT5) and provides:
- Real-time chart data streaming
- Live price updates
- Position management
- Automated trading strategies
- Manual trade execution
- MT5 connection monitoring with auto-reconnection

**Architecture**: Clean separation of concerns with 8 independent modules orchestrated by a central WebSocket server.


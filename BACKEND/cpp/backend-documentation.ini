7️⃣ strategy_manager.py - Strategy Engine
Purpose: Manage automated trading strategies
Responsibilities:
	∙	Deploy/remove/update strategies
	∙	Run backtests
	∙	Monitor strategies independently
	∙	Execute trades when auto-trading enabled
	∙	Fetch its own candle data
Strategy Lifecycle:

1. Deploy → create instance → fetch initial data → start update loop
2. Update Loop → fetch latest candles → calculate signals → execute if AUTO_ON
3. Remove → stop update loop → delete instance



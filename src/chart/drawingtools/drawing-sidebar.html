<!-- ================================================================
     DRAWING TOOLS SIDEBAR - Always Visible Left Panel
     ================================================================ -->
<div class="drawing-sidebar">
  <div class="drawing-tools-vertical">
    <!-- Cursor / Select -->
    <button class="drawing-tool-btn-vertical" data-tool="cursor" title="Select">
      <i class="fas fa-mouse-pointer"></i>
    </button>
    
    <!-- Lines -->
    <button class="drawing-tool-btn-vertical" data-tool="TrendLine" title="Trend Line">
      <i class="fas fa-chart-line"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="HorizontalLine" title="Horizontal Line">
      <i class="fas fa-minus"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="VerticalLine" title="Vertical Line">
      <i class="fas fa-grip-lines-vertical"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="Ray" title="Ray">
      <i class="fas fa-arrow-up"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="ExtendedLine" title="Extended Line">
      <i class="fas fa-arrows-alt-h"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="HorizontalRay" title="Horizontal Ray">
      <i class="fas fa-long-arrow-alt-right"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="CrossLine" title="Cross Line">
      <i class="fas fa-plus"></i>
    </button>
    
    <!-- Separator -->
    <div class="tool-separator"></div>
    
    <!-- Shapes -->
    <button class="drawing-tool-btn-vertical" data-tool="Rectangle" title="Rectangle">
      <i class="far fa-square"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="Circle" title="Circle">
      <i class="far fa-circle"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="Triangle" title="Triangle">
      <i class="fas fa-play"></i>
    </button>
    
    <!-- Separator -->
    <div class="tool-separator"></div>
    
    <!-- Fibonacci & Channels -->
    <button class="drawing-tool-btn-vertical" data-tool="FibRetracement" title="Fibonacci Retracement">
      <i class="fas fa-wave-square"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="ParallelChannel" title="Parallel Channel">
      <i class="fas fa-bars"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="PriceRange" title="Price Range">
      <i class="fas fa-arrows-alt-v"></i>
    </button>
    
    <!-- Separator -->
    <div class="tool-separator"></div>
    
    <!-- Text & Annotations -->
    <button class="drawing-tool-btn-vertical" data-tool="Text" title="Text Tool">
      <i class="fas fa-font"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="Callout" title="Callout">
      <i class="fas fa-comment"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="Arrow" title="Arrow">
      <i class="fas fa-arrow-right"></i>
    </button>
    
    <!-- Separator -->
    <div class="tool-separator"></div>
    
    <!-- Drawing Tools -->
    <button class="drawing-tool-btn-vertical" data-tool="Brush" title="Brush">
      <i class="fas fa-pen"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="Highlighter" title="Highlighter">
      <i class="fas fa-highlighter"></i>
    </button>
    
    <button class="drawing-tool-btn-vertical" data-tool="Path" title="Path">
      <i class="fas fa-bezier-curve"></i>
    </button>
    
    <!-- Separator -->
    <div class="tool-separator"></div>
    
    <!-- Trading Tools -->
    <button class="drawing-tool-btn-vertical" data-tool="LongShortPosition" title="Long/Short Position">
      <i class="fas fa-exchange-alt"></i>
    </button>
    
    <!-- Separator -->
    <div class="tool-separator"></div>
    
    <!-- Clear All -->
    <button class="drawing-tool-btn-vertical clear-btn" data-action="clear-drawings" title="Clear All Drawings">
      <i class="fas fa-trash-alt"></i>
    </button>
  </div>
</div>
